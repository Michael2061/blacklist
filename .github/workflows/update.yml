name: Daily Blocklist Update

on:
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch: 

# Hier definieren wir die Variable global für das ganze Dokument
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        # Wir können die Variable hier auch nochmal pro Schritt erzwingen
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Verify and Install Dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run Go Optimizer
        run: go run merge.go

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add whitelist.txt blocklist.txt version.txt version.json sources.txt allowlist.txt
          
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Update: DNS List Sync"
            git push
          fi