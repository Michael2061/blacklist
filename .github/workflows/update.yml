name: Daily Blocklist Update

on:
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

env:
  # Hiermit verschwindet die Warnung und du nutzt sofort das neue Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Bleibt v4, nutzt aber jetzt Node 24 durch env

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # Sicherste Methode gegen tar-Fehler

      - name: Verify and Install Dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run Go Optimizer
        run: go run merge.go

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Fügt alle relevanten Dateien hinzu
          git add whitelist.txt blocklist.txt version.txt version.json sources.txt allowlist.txt
          
          if git diff --cached --quiet; then
            echo "Keine Änderungen gefunden."
          else
            git commit -m "Auto-Update: Blocklist & Whitelist Cleanup (Node24/Go)"
            git push
          fi